@if (activeConfig().allowedDimensions.length > 0) {
  <div class="flex items-center gap-2 lg:gap-4 w-[max-content]">
    <div class="flex items-center gap-2 lg:gap-3">
      @if (hasDimension('year')) {
        <label class="ds-filter-group h-10 px-2 lg:px-3">
          <span class="ds-filter-label">{{ 'filter.year' | transloco }}</span>
          <select
            class="ds-filter-select"
            [value]="state().year"
            (change)="onChange('year', $event)"
          >
            <option [value]="'null'">{{ 'filter.all' | transloco }}</option>
            @for (y of availableYears(); track y) {
              <option [value]="y">{{ y }}</option>
            }
          </select>
        </label>
      }

      @if (hasDimension('region')) {
        <label class="ds-filter-group h-10 px-2 lg:px-3">
          <span class="ds-filter-label">{{ 'filter.region' | transloco }}</span>
          <select
            class="ds-filter-select"
            [value]="state().region"
            (change)="onChange('region', $event)"
          >
            <option [value]="'null'">{{ 'filter.all' | transloco }}</option>
            @for (r of availableRegions(); track r) {
              <option [value]="r">{{ r }}</option>
            }
          </select>
        </label>
      }

      @if (hasDimension('stage')) {
        <label class="ds-filter-group h-10 px-2 lg:px-3">
          <span class="ds-filter-label">{{ 'filter.stage' | transloco }}</span>
          <select
            class="ds-filter-select"
            [value]="state().stage"
            (change)="onChange('stage', $event)"
          >
            <option [value]="'null'">{{ 'filter.all' | transloco }}</option>
            @for (s of availableStages(); track s) {
              <option [value]="s">{{ s }}</option>
            }
          </select>
        </label>
      }

      @if (hasDimension('gender')) {
        <label class="ds-filter-group h-10 px-2 lg:px-3">
          <span class="ds-filter-label">{{ 'filter.gender' | transloco }}</span>
          <select
            class="ds-filter-select"
            [value]="state().gender"
            (change)="onChange('gender', $event)"
          >
            <option [value]="'null'">{{ 'filter.all' | transloco }}</option>
            @for (g of availableGenders(); track g) {
              <option [value]="g">{{ g }}</option>
            }
          </select>
        </label>
      }
    </div>

    @if (!isDefaultState()) {
      <button
        class="ds-icon-btn shrink-0"
        (click)="onReset()"
        [title]="'filter.reset' | transloco"
      >
        <lucide-icon [img]="ResetIcon" size="18"></lucide-icon>
      </button>
    }
  </div>
}
