<div
  class="ds-filter-group relative cursor-pointer outline-none select-none h-10 px-2 lg:px-3"
  [class.border-primary]="isOpen()"
  (click)="toggleOpen()"
  tabindex="0"
>
  <span class="ds-filter-label">{{ label() }}</span>
  
  <!-- Trigger Value -->
  <div class="flex items-center gap-1.5 text-sm font-medium" style="color: var(--color-on-surface)">
    <span class="truncate">
      @if (selectedOption()) {
        {{ selectedOption()?.labelKey ? (selectedOption()!.labelKey! | transloco) : selectedOption()?.label }}
      } @else {
        ...
      }
    </span>
    <lucide-icon
      [img]="ChevronIcon"
      size="14"
      class="text-soft transition-transform duration-200"
      [class.rotate-180]="isOpen()"
    ></lucide-icon>
  </div>

  <!-- Dropdown Panel -->
  @if (isOpen()) {
    <div
      class="absolute left-0 top-full mt-2 w-full min-w-[150px] z-50 rounded-lg py-1.5 shadow-ambient-token"
      style="background-color: var(--color-surface-highest); border: 1px solid var(--color-outline-soft);"
    >
      <ul class="flex flex-col max-h-60 overflow-y-auto scrollbar-thin-soft">
        @for (option of options(); track option.value) {
          <li>
            <button
              type="button"
              class="flex items-center w-full px-3 py-2 text-sm text-left transition-colors cursor-pointer"
              [class.bg-primary-soft]="value() === option.value"
              [class.text-primary]="value() === option.value"
              [class.hover:bg-surface-high]="value() !== option.value"
              (click)="selectOption(option, $event)"
              style="color: var(--color-on-surface);"
            >
              <span class="flex-grow truncate" [class.font-semibold]="value() === option.value">
                {{ option.labelKey ? (option.labelKey | transloco) : option.label }}
              </span>
              @if (value() === option.value) {
                <lucide-icon [img]="CheckIcon" size="14" class="shrink-0 text-primary-token ml-2"></lucide-icon>
              }
            </button>
          </li>
        }
      </ul>
    </div>
  }
</div>
