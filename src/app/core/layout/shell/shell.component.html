<app-topbar
  class="flex-none z-30 relative bg-page pt-2"
  [currentLang]="prefService.language()"
  [currentTheme]="prefService.theme()"
  [activeConfig]="filterService.activeConfig()"
  [state]="filterService.state()"
  [availableYears]="filterService.availableYears()"
  [availableRegions]="filterService.availableRegions()"
  [availableStages]="filterService.availableStages()"
  [availableGenders]="filterService.availableGenders()"
  (toggleLang)="toggleLanguage()"
  (toggleTheme)="prefService.toggleTheme()"
  (filterChange)="filterService.setFilter($event.dimension, $event.value)"
  (resetFilters)="filterService.resetAll()"
/>

<div class="flex-1 min-h-0 flex flex-col md:flex-row relative bg-page">
  <app-nav
    class="flex-none z-20 order-last w-full md:order-first md:w-20 lg:w-24 md:h-full bg-transparent"
  />

  <main
    class="relative z-10 flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-6 lg:p-8 m-3 md:m-5 lg:mr-8 rtl:lg:ml-8 rtl:lg:mr-0 bg-surface-low rounded-2xl shadow-soft flex flex-col scrollbar-thin-primary"
  >
    @if (pageTitleKey()) {
      <h2 class="font-display text-2xl md:text-3xl font-extrabold text-main mb-6">
        {{ pageTitleKey() | transloco }}
      </h2>
    }

    <!-- The RouterOutlet hosts the feature pages -->
    <router-outlet />
  </main>
</div>

<!-- Floating Settings FAB -->
<app-floating-settings
  [currentLang]="prefService.language()"
  [currentTheme]="prefService.theme()"
  (toggleLang)="toggleLanguage()"
  (toggleTheme)="prefService.toggleTheme()"
/>
