<div class="ds-chart-card h-full flex flex-col">
  <h3 class="ds-title-sm mb-4">{{ 'overview.analytics.leaderboard-title' | transloco }}</h3>
  <ol class="flex flex-col gap-2">
    @for (row of rows(); track row.rank) {
      <li class="flex items-center gap-3 py-2 px-2 rounded-lg {{ $even ? 'bg-surface-low' : '' }}">
        <span class="ds-label-md w-6 text-center">{{ row.rank }}</span>
        <span class="ds-body-sm flex-1 truncate">{{ row.region }}</span>
        <div class="flex-1 h-1 rounded-full bg-surface-high overflow-hidden">
          <div
            class="h-full rounded-full"
            [style.width.%]="row.barWidthPercent"
            style="background-color: var(--chart-1)"
          ></div>
        </div>
        <span class="ds-caption w-16 text-end">{{ row.formattedCount }}</span>
      </li>
    }
  </ol>
</div>
