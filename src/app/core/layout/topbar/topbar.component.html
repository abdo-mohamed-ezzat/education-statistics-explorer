<header
  class="flex flex-wrap md:flex-nowrap items-center px-4 lg:px-8 py-3 bg-transparent gap-y-3 gap-x-6 w-full"
>
  <!-- Branding Area -->
  <div
    class="ds-topbar-branding w-full md:w-auto flex-none flex items-center justify-center md:justify-start gap-[0.75rem] sm:gap-[1rem]"
  >
    <div
      class="hidden md:flex flex-none items-center justify-center w-[2.25rem] h-[2.25rem] sm:w-[2.5rem] sm:h-[2.5rem] rounded-xl bg-primary/10 text-primary"
    >
      <lucide-icon [img]="LogoIcon" class="logo-icon"></lucide-icon>
    </div>
    <div class="flex flex-col min-w-0 text-center md:text-start px-2">
      <h1
        class="text-[0.95rem] md:text-[1.15rem] font-bold text-main font-display m-0 leading-tight whitespace-normal break-words"
      >
        {{ 'topbar.app-title' | transloco }}
      </h1>
      <span class="ds-topbar-subtitle hidden md:block text-[0.7rem] opacity-80">
        {{ 'topbar.subtitle' | transloco }}
      </span>
    </div>
  </div>

  <div class="flex-1 w-full flex justify-center md:justify-end gap-y-2 pb-1 xl:pb-0 min-w-0">
    @if (activeConfig().allowedDimensions.length > 0) {
      <app-filter-bar
        [activeConfig]="activeConfig()"
        [state]="state()"
        [availableYears]="availableYears()"
        [availableRegions]="availableRegions()"
        [availableStages]="availableStages()"
        [availableGenders]="availableGenders()"
        (filterChange)="filterChange.emit($event)"
        (resetFilters)="resetFilters.emit()"
      />
    }
  </div>

  <!-- Actions (if any, like Export/Settings should go rightmost later) -->
</header>
